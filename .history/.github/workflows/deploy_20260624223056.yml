script: |
          # 1. Dem Server sagen, dass er diesem Git-Ordner blind vertrauen darf (behebt Rechte-Probleme)
          git config --global --add safe.directory /var/www/vokabel-backend/AnkiBackend

          # 2. In den Ordner wechseln
          cd /var/www/vokabel-backend/AnkiBackend

          # 3. Den Code hart aktualisieren (ohne nachzufragen oder zu blockieren)
          git fetch origin main
          git reset --hard origin/main

          # 4. Abhängigkeiten installieren
          npm install --production

          # 5. PM2 neu starten und Umgebungsvariablen auffrischen
          pm2 restart vokabel-backend --update-env || pm2 start server.js --name "vokabel-backend"