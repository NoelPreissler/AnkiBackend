  name: Deploy Backend to Ubuntu

  # Die Pipeline startet automatisch, sobald Code in den "main"-Branch gepusht wird
  on:
    push:
      branches:
        - main

  jobs:
    deploy:
      runs-on: ubuntu-latest

      steps:
      # 1. Schritt: Den Code aus dem GitHub-Repository auschecken
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Schritt: Per SSH auf der Ubuntu-Instanz einwählen und Befehle ausführen
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22 # Standard-SSH-Port (falls du ihn geändert hast, hier anpassen)
          script: |
            # 1. In den Ordner des Backends auf dem Server wechseln
            # (Passe den Pfad an, je nachdem wo dein Backend auf der Ubuntu-Instanz liegt!)
            cd /var/www/vokabel-backend/AnkiBackend

            # 2. Den neuesten Code von GitHub ziehen
            sudo git fetch origin main
            sudo git reset --hard origin/main

            # 4. Neue npm-Pakete installieren (falls in der package.json etwas hinzugefügt wurde)
            sudo npm install --production

            # 5. Die Anwendung mit PM2 neu starten, damit die Änderungen aktiv werden
            # (Wir haben das Backend in der Anleitung zuvor "vokabel-backend" genannt)
            sudo pm2 restart vokabel-backend && sudo touch a && echo "Testfile"